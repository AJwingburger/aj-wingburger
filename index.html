<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A & J Wingburger | Menu & Reviews</title>
  <!-- FontAwesome for modern interface icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Link to your external stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Sticky Navigation Header -->
  <header class="main-header">
    <div class="header-container">
      <div class="logo-area">
        <h1>A & J Wingburger</h1>
        <div class="meta-tags">
          <span><i class="fa-solid fa-star" style="color: var(--accent-yellow);"></i> 4.5 (105 reviews)</span>
        </div>
      </div>
      <nav class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('menu-tab', this)">Menu</button>
        <button class="tab-btn" onclick="switchTab('reviews-tab', this)">Reviews (105)</button>
      </nav>
    </div>
  </header>

  <!-- Visual Hero Banner -->
  <section class="store-hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h2>Delicious Wings, Burgers & Korean Classics</h2>
      <p><i class="fa-solid fa-location-dot"></i> 1134 Hill Rd N, Pickerington, OH 43147 | <i class="fa-solid fa-phone"></i> (614) 367-1110</p>
    </div>
  </section>

  <!-- 1. MENU SECTION -->
  <section id="menu-tab" class="content-section active">
    <div class="menu-layout">
      <aside class="menu-sidebar">
        <h3>Categories</h3>
        <ul id="sidebar-categories"></ul>
      </aside>
      <div class="menu-feed" id="menu-feed-content"></div>
    </div>
  </section>

  <!-- 2. REVIEWS SECTION -->
  <section id="reviews-tab" class="content-section">
    <h2 style="margin-bottom: 8px;">Customer Reviews (105)</h2>
    <p style="color: var(--text-muted); margin-bottom: 24px;">Read genuine feedback and community ratings across all experiences.</p>
    
    <div class="reviews-grid" id="reviews-container"></div>
  </section>

  <!-- Link to your external script file -->
  <script src="script.js"></script>
</body>
</html>
